services:
  openclaw-gateway:
    image: ghcr.io/${GHCR_USERNAME}/openclaw-docker-config/openclaw-gateway:latest
    env_file: .env
    restart: unless-stopped
    # 1. Disable high-privilege access
    privileged: false
    # 2. Prevent gaining new privileges (blocks many exploits)
    security_opt:
    - no-new-privileges:true
    # 3. Drop all kernel capabilities, then add back ONLY what's needed
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETGID
    - SETUID
    # (Note: NET_ADMIN is NOT added, which blocks most VPN/Tailscale setups)
    # 4. Resource limits (prevent "noisy neighbor" or mining)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3072M
        reservations:
          memory: 1024M
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-0.0.0.0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GH_TOKEN: ${GH_TOKEN:-}
    # 5. Filesystem Hardening
    # Mount root as read-only, but keep the workspace writable
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /run:size=16M
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/openclaw/.openclaw}:/home/node/.openclaw:rw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/openclaw/.openclaw/workspace}:/home/node/.openclaw/workspace:rw
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    command: openclaw gateway --bind lan --port 18789
