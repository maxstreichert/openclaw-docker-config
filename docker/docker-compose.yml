services:
  openclaw-gateway:
    image: ghcr.io/${GHCR_USERNAME}/openclaw-docker-config/openclaw-gateway:ae1165a
    env_file: .env
    restart: unless-stopped
    # 1. Disable high-privilege access
    privileged: false
    # 2. Prevent gaining new privileges (blocks many exploits)
    security_opt:
    - no-new-privileges:true
    # 3. Drop all kernel capabilities, then add back ONLY what's needed
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETGID
    - SETUID
    # (Note: NET_ADMIN is NOT added, which blocks most VPN/Tailscale setups)
    # 4. Resource limits (prevent "noisy neighbor" or mining)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3072M
        reservations:
          memory: 1024M
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/openclaw/.openclaw}:/home/node/.openclaw:rw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/openclaw/.openclaw/workspace}:/home/node/.openclaw/workspace:rw
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    command: openclaw gateway --bind loopback --port 18789
