# Builds openclaw-gateway from docker/Dockerfile and pushes to GHCR via
# scripts/build-and-push.sh (validates config, tags :latest and :<git-sha>).
#
# Repository configuration (Settings → Secrets and variables → Actions):
#
#   Secrets
#     GHCR_TOKEN          PAT with write:packages (or repo GITHUB_TOKEN if the
#                         image namespace matches this repo owner — see below)
#
#   Variables or secrets
#     GHCR_USERNAME       GitHub user/org that owns the GHCR namespace
#                         (e.g. maxstreichert → ghcr.io/maxstreichert/openclaw-docker-config/...)
#
# Optional: create a GitHub Environment (e.g. ghcr-publish) and attach the
# secrets/variables there; then uncomment `environment:` on the job below.

name: Build and push gateway image

on:
  schedule:
    # Daily at 08:00 UTC / 02:00 AM ET
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Primary image tag (also pushes :<git-sha>)'
        required: false
        default: latest
        type: string

concurrency:
  group: ghcr-build-push
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ghcr-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME || secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        env:
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || secrets.GHCR_USERNAME }}
        run: ./scripts/build-and-push.sh "${{ github.event.inputs.tag || 'latest' }}"
